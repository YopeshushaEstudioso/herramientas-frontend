# Ejemplo de servicio a AGREGAR al docker-compose.yml que ya tienes para
# herramientas-node-api. No reemplaces tu compose completo: copia este
# bloque "frontend" dentro de tu archivo existente, en el mismo nivel
# que tus servicios "backend" (o "api") y "db".
#
# IMPORTANTE:
# - Ajusta en frontend-app/nginx.conf el nombre "backend" del
#   proxy_pass para que coincida con el nombre real de tu servicio
#   backend en el compose (ej: "api", "herramientas-node-api", etc).
# - En Coolify, asigna el dominio público SOLO al servicio "frontend"
#   (puerto 80). El servicio backend/db no debe tener dominio propio.

services:
  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80"          # Coolify enruta el dominio público a este puerto
    depends_on:
      - backend        # <- cambia si tu servicio backend se llama distinto
    networks:
      - app-network

networks:
  app-network:
    external: false     # usa el mismo nombre de red que ya define tu compose

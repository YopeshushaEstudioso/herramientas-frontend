server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Rutas de React Router: cualquier ruta que no sea un archivo
    # cae en index.html para que react-router-dom la resuelva.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy interno hacia el backend (herramientas-node-api).
    # "backend" debe coincidir con el nombre del servicio en
    # docker-compose.yml. No expongas este servicio con dominio propio
    # en Coolify: solo el frontend (este contenedor, puerto 80) es público.
    location ^~ /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Documentación Swagger del backend, accesible vía el mismo dominio.
    location ^~ /docs {
        proxy_pass http://backend:3000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~* \.(?:css|js|svg|woff2?|ttf|ico|png|jpg|jpeg)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
